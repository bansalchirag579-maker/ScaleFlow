<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ScaleFlow | Authorization Portal</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-app: #06080d;
      --bg-card: rgba(17, 22, 37, 0.6);
      --border-color: rgba(255, 255, 255, 0.06);
      --text-main: #f1f5f9;
      --text-muted: #94a3b8;
      --primary: #3b82f6;
      --primary-gradient: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
      --danger: #ef4444;
      --font-family-title: 'Outfit', sans-serif;
      --font-family-body: 'Inter', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-family-body);
      background-color: var(--bg-app);
      color: var(--text-main);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow-x: hidden;
      /* Subtle premium glowing backgrounds */
      background-image: 
        radial-gradient(circle at 10% 20%, rgba(59, 130, 246, 0.08) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(168, 85, 247, 0.08) 0%, transparent 40%);
    }

    .auth-container {
      width: 100%;
      max-width: 440px;
      padding: 20px;
    }

    .logo-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .logo-icon {
      font-size: 32px;
      margin-bottom: 8px;
      display: inline-block;
      filter: drop-shadow(0 0 10px rgba(59, 130, 246, 0.3));
    }

    .logo-text {
      font-family: var(--font-family-title);
      font-weight: 800;
      font-size: 26px;
      letter-spacing: -0.5px;
      background: linear-gradient(to right, #ffffff, #94a3b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .glass-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(20px);
    }

    /* Tabs Header */
    .auth-tabs {
      display: flex;
      border-bottom: 1px solid var(--border-color);
      margin-bottom: 24px;
    }

    .tab-btn {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-family: var(--font-family-title);
      font-size: 15px;
      font-weight: 600;
      padding: 12px;
      cursor: pointer;
      position: relative;
      transition: color 0.2s ease;
    }

    .tab-btn:hover {
      color: var(--text-main);
    }

    .tab-btn.active {
      color: var(--text-main);
    }

    .tab-btn.active::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      width: 100%;
      height: 2px;
      background: var(--primary);
      box-shadow: 0 0 8px rgba(59, 130, 246, 0.5);
    }

    /* Form Styles */
    .auth-form {
      display: none;
      animation: formFadeIn 0.3s ease;
    }

    .auth-form.active {
      display: block;
    }

    @keyframes formFadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .form-control {
      width: 100%;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border-color);
      color: var(--text-main);
      padding: 12px 14px;
      border-radius: 8px;
      font-family: var(--font-family-body);
      font-size: 14px;
      outline: none;
      transition: all 0.2s ease;
    }

    .form-control:focus {
      border-color: var(--primary);
      background: rgba(255, 255, 255, 0.05);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.25);
    }

    .btn {
      width: 100%;
      background: var(--primary-gradient);
      color: var(--text-main);
      border: none;
      font-family: var(--font-family-body);
      font-size: 14px;
      font-weight: 600;
      padding: 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.25);
      margin-top: 10px;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(59, 130, 246, 0.4);
    }

    /* Alert / Errors box */
    .alert-box {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: var(--danger);
      font-size: 13px;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      line-height: 1.4;
      display: none;
    }

    .alert-box.active {
      display: block;
    }
    
    .demo-info {
      font-size: 11px;
      color: var(--text-muted);
      text-align: center;
      margin-top: 20px;
      line-height: 1.5;
    }
  </style>
</head>
<body>

  <div class="auth-container">
    
    <div class="logo-header">
      <div class="logo-icon">⚡</div>
      <div class="logo-text">ScaleFlow</div>
    </div>
    
    <div class="glass-card">
      
      <!-- Tabs -->
      <div class="auth-tabs">
        <button class="tab-btn active" id="tab-login-btn">Sign In</button>
        <button class="tab-btn" id="tab-register-btn">Create Workspace</button>
      </div>
      
      <!-- Error Alerts -->
      <div class="alert-box" id="error-alert">Error message here</div>
      
      <!-- Login Form -->
      <form class="auth-form active" id="form-login">
        <div class="form-group">
          <label for="login-username">Username or Email</label>
          <input type="text" id="login-username" class="form-control" placeholder="e.g. alice" required>
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" class="form-control" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn">Sign In</button>
      </form>
      
      <!-- Register Form -->
      <form class="auth-form" id="form-register">
        <div class="form-group">
          <label for="reg-name">Full Name</label>
          <input type="text" id="reg-name" class="form-control" placeholder="e.g. Sarah Connor" required>
        </div>
        <div class="form-group">
          <label for="reg-username">Username</label>
          <input type="text" id="reg-username" class="form-control" placeholder="e.g. sarahc" required>
        </div>
        <div class="form-group">
          <label for="reg-email">Email Address</label>
          <input type="email" id="reg-email" class="form-control" placeholder="e.g. sarah@company.com" required>
        </div>
        <div class="form-group">
          <label for="reg-password">Password</label>
          <input type="password" id="reg-password" class="form-control" placeholder="Minimum 6 characters" minlength="6" required>
        </div>
        <div class="form-group">
          <label for="reg-org">Organization / Workspace Name</label>
          <input type="text" id="reg-org" class="form-control" placeholder="e.g. Connor Industries" required>
        </div>
        <button type="submit" class="btn">Launch Workspace</button>
      </form>

      <div class="demo-info">
        <strong>💡 Live Sandbox Accounts:</strong><br>
        Log in as <code>alice</code> with password <code>password123</code> to access a seeded Pro tier account instantly.
      </div>
      
    </div>
  </div>

  <script>
    // Tab Toggling
    const tabLogin = document.getElementById('tab-login-btn');
    const tabRegister = document.getElementById('tab-register-btn');
    const formLogin = document.getElementById('form-login');
    const formRegister = document.getElementById('form-register');
    const errorAlert = document.getElementById('error-alert');

    function showError(msg) {
      errorAlert.textContent = msg;
      errorAlert.classList.add('active');
    }

    function clearError() {
      errorAlert.classList.remove('active');
    }

    tabLogin.addEventListener('click', () => {
      tabLogin.classList.add('active');
      tabRegister.classList.remove('active');
      formLogin.classList.add('active');
      formRegister.classList.remove('active');
      clearError();
    });

    tabRegister.addEventListener('click', () => {
      tabRegister.classList.add('active');
      tabLogin.classList.remove('active');
      formRegister.classList.add('active');
      formLogin.classList.remove('active');
      clearError();
    });

    // Form Submissions
    formLogin.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearError();

      const usernameOrEmail = document.getElementById('login-username').value;
      const password = document.getElementById('login-password').value;

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ usernameOrEmail, password })
        });
        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Authentication failed');
        }

        // Save token to localStorage
        localStorage.setItem('scaleflow_token', data.token);
        
        // Redirect to main panel
        window.location.href = '/index.html';
      } catch (err) {
        showError(err.message);
      }
    });

    formRegister.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearError();

      const name = document.getElementById('reg-name').value;
      const username = document.getElementById('reg-username').value;
      const email = document.getElementById('reg-email').value;
      const password = document.getElementById('reg-password').value;
      const organizationName = document.getElementById('reg-org').value;

      try {
        const response = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, username, email, password, organizationName })
        });
        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Workspace creation failed');
        }

        // Save token
        localStorage.setItem('scaleflow_token', data.token);
        
        // Redirect to main panel
        window.location.href = '/index.html';
      } catch (err) {
        showError(err.message);
      }
    });
  </script>
</body>
</html>
